minimumReleaseAge: 1440
shamefullyHoist: true
strictPeerDependencies: false
shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - '@nuxt/vite-builder@4.4.2'
  - '@vitejs/plugin-vue-jsx@5.1.5'
  - '@babel/core@7.29.0'
  - semver@6.3.1

overrides:
  unimport: 5.6.0

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: true
